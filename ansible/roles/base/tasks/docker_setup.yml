---
# Configure Docker and Podman for the user

- name: Ensure /etc/containers/registries.conf.d exists for podman
  file:
    path: /etc/containers/registries.conf.d
    state: directory
    mode: '0755'
  become: yes

- name: Deploy podman registries drop-in (docker.io unqualified search)
  copy:
    src: "{{ configs_dir }}/containers/registries.conf.d/99-docker-unqualified.conf"
    dest: /etc/containers/registries.conf.d/99-docker-unqualified.conf
    mode: '0644'
  become: yes

- name: Ensure docker group exists
  group:
    name: docker
    state: present
  become: yes

- name: Ensure podman group exists (if podman creates it)
  group:
    name: podman
    state: present
  become: yes
  ignore_errors: yes

- name: Add user to docker group
  user:
    name: "{{ user_name }}"
    groups: docker
    append: yes
  become: yes

- name: Add user to podman group
  user:
    name: "{{ user_name }}"
    groups: podman
    append: yes
  become: yes
  ignore_errors: yes

- name: Start and enable Docker service
  systemd:
    name: docker
    enabled: yes
    state: started
  become: yes

